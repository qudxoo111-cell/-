<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DESIGN SOOP</title>
<style>
body{
margin:0;
font-family:'Pretendard',sans-serif;
background:#f5f0e8;
color:#222;
}
header{
position:fixed;
top:0;
left:0;
width:100%;
padding:20px 40px;
background:rgba(0,0,0,0.45);
color:#fff;
z-index:1000;
backdrop-filter:blur(8px);
}
.hero{
height:100vh;
background:url('images/main.jpg') center/cover no-repeat;
display:flex;
align-items:center;
padding:0 60px;
color:#fff;
}
.hero h1{
font-size:72px;
margin:0;
}
.section{
padding:100px 40px;
}
.card{
background:#fff;
padding:20px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}
img{
max-width:100%;
border-radius:12px;
}
</style>
</head>
<body>

<header>
<h2>DESIGN SOOP</h2>
</header>

<section class="hero">
<div>
<h1>공간에 가치를 더하다</h1>
<p>디자인숲 인테리어</p>
</div>
</section>

<section class="section">
<div class="card">
<h2>프로젝트</h2>
<p>images 폴더에 사진을 넣으면 자동 표시됩니다.</p>
<img src="images/sample.jpg" alt="">
</div>
</section>

</body>
</html>
