<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디자인숲</title>
<style>
body{
margin:0;
font-family:'Pretendard',sans-serif;
background:#f4eee6;
color:#222;
}
.wrap{
max-width:1200px;
margin:auto;
padding:60px 20px;
}
.hero{
height:500px;
border-radius:30px;
overflow:hidden;
background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1400&q=80') center/cover;
position:relative;
}
.hero::after{
content:'';
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
}
.hero-text{
position:absolute;
z-index:2;
left:60px;
bottom:60px;
color:#fff;
}
.hero-text h1{
font-size:58px;
margin:0;
}
.hero-text p{
font-size:18px;
opacity:.9;
}
.admin-box{
margin-top:50px;
background:#fffaf3;
padding:40px;
border-radius:28px;
box-shadow:0 20px 50px rgba(0,0,0,.08);
}
input,select,button{
width:100%;
padding:16px;
margin-bottom:14px;
border-radius:14px;
border:1px solid #ddd;
font-size:15px;
box-sizing:border-box;
}
button{
background:#111;
color:#fff;
font-weight:bold;
cursor:pointer;
}
.notice{
padding:14px;
background:#f6efe5;
border-left:4px solid #9b7447;
border-radius:12px;
margin-bottom:14px;
font-size:14px;
line-height:1.7;
}
.preview{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}
.preview img{
width:100%;
height:220px;
object-fit:cover;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}
</style>
</head>
<body>

<div class="wrap">

<div class="hero">
<div class="hero-text">
<h1>DESIGN SOOP</h1>
<p>공간에 가치를 더하다</p>
</div>
</div>

<div class="admin-box">

<h2>프로젝트 등록</h2>

<div class="notice">
사진이 너무 커도 자동으로 화면 크기에 맞게 줄여서 업로드됩니다.
</div>

<select>
<option>상업공간 인테리어</option>
<option>주거공간 인테리어</option>
<option>사무실 공간 디자인</option>
</select>

<input type="text" placeholder="프로젝트 제목 입력">

<input type="file" id="upload" multiple accept="image/*">

<button onclick="saveImages()">프로젝트 등록</button>

<div class="preview" id="preview"></div>

</div>

</div>

<script>
async function resizeImage(file,maxSize=1280,quality=0.65){

return new Promise(resolve=>{

const reader=new FileReader();

reader.onload=e=>{

const img=new Image();

img.onload=()=>{

let w=img.width;
let h=img.height;

if(w>h){
if(w>maxSize){
h=Math.round(h*(maxSize/w));
w=maxSize;
}
}else{
if(h>maxSize){
w=Math.round(w*(maxSize/h));
h=maxSize;
}
}

const canvas=document.createElement('canvas');
const ctx=canvas.getContext('2d');

canvas.width=w;
canvas.height=h;

ctx.imageSmoothingEnabled=true;
ctx.imageSmoothingQuality='high';

ctx.drawImage(img,0,0,w,h);

resolve(canvas.toDataURL('image/jpeg',quality));

};

img.src=e.target.result;

};

reader.readAsDataURL(file);

});

}

async function saveImages(){

const files=[...document.getElementById('upload').files];

if(!files.length){
alert('사진을 선택해주세요.');
return;
}

const preview=document.getElementById('preview');

preview.innerHTML='';

for(const file of files){

const resized=await resizeImage(file);

const img=document.createElement('img');

img.src=resized;

preview.appendChild(img);

}

alert('이미지가 자동 축소되어 등록되었습니다.');

}
</script>

</body>
</html>
